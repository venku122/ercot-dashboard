services:
  receiver:
    image: ercot-receiver:local
    build:
      context: .
      dockerfile: ercot-receiver/Dockerfile
    container_name: ercot-receiver-dev
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      METRICS_API_KEY: "${METRICS_API_KEY:-local-dev-key}"
    volumes:
      - ./ercot-receiver/data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/status', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  collector:
    image: ercot-collector:local
    build:
      context: ./ercot-collector
      dockerfile: Dockerfile
    container_name: ercot-collector-dev
    environment:
      METRICS_ENDPOINT: http://receiver:8080/api/ingest
      METRICS_API_KEY: "${METRICS_API_KEY:-local-dev-key}"
    depends_on:
      receiver:
        condition: service_healthy
    restart: unless-stopped
