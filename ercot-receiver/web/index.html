<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERCOT Local Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <h1>ERCOT Local Dashboard</h1>
      <p class="subtitle">Live metrics from the local receiver</p>
    </div>
    <div class="controls">
      <label>
        Range
        <select id="range">
          <option value="3600">Last 1 hour</option>
          <option value="21600" selected>Last 6 hours</option>
          <option value="43200">Last 12 hours</option>
          <option value="86400">Last 24 hours</option>
        </select>
      </label>
      <div class="toggle-group" role="group" aria-label="Series labels">
        <label class="toggle">
          <input type="checkbox" id="toggle-legend" checked />
          Legend
        </label>
        <label class="toggle">
          <input type="checkbox" id="toggle-inline" checked />
          Inline labels
        </label>
      </div>
      <button id="refresh">Refresh</button>
    </div>
  </header>

  <section class="grid" id="cards"></section>

  <script src="/vendor/chart.umd.js"></script>
  <script src="/vendor/date-fns.min.js"></script>
  <script src="/vendor/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
